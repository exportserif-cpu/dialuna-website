<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B4A;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1A237E;stop-opacity:0.1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C9A84C" opacity="0.6"/>
    </marker>
    <marker id="arrowheadSmall" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="rgba(201,168,76,0.3)"/>
    </marker>
  </defs>
  
  <!-- Background globe hint -->
  <ellipse cx="600" cy="220" rx="350" ry="160" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>
  
  <!-- Simple continent outlines (simplified) -->
  <!-- Europe Outline -->
  <path d="M500,155 Q510,140 520,138 Q535,135 540,140 Q548,145 542,152 Q538,158 530,160 Q520,162 510,158 Q505,156 500,155Z" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.15)" stroke-width="0.5"/>
  
  <!-- Asia Outline -->
  <path d="M540,140 Q560,130 580,125 Q610,118 640,120 Q660,125 670,135 Q680,145 675,158 Q670,165 650,168 Q630,170 600,168 Q570,165 555,160 Q545,155 540,152Z" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>
  
  <!-- Africa Outline -->
  <path d="M505,160 Q510,175 508,195 Q505,210 500,220 Q495,230 490,225 Q485,215 488,200 Q492,180 498,165Q500,160 505,160Z" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>
  
  <!-- North America Outline -->
  <path d="M280,120 Q290,110 310,105 Q330,100 345,108 Q355,115 350,130 Q345,140 330,145 Q310,148 295,142 Q282,135 280,125Z" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>
  
  <!-- South America Outline -->
  <path d="M305,150 Q310,165 308,185 Q305,200 300,215 Q295,225 290,220 Q288,210 290,195 Q295,175 300,160Q302,152 305,150Z" fill="rgba(201,168,76,0.05)" stroke="rgba(201,168,76,0.1)" stroke-width="0.5"/>
  
  <!-- Australia Outline -->
  <path d="M705,225 Q715,218 725,220 Q735,225 732,235 Q728,242 718,245 Q708,245 705,238Z" fill="rgba(201,168,76,0.05)" stroke="rgba(201,168,76,0.1)" stroke-width="0.5"/>
  
  <!-- Turkey marker (starting point) -->
  <circle cx="530" cy="150" r="4" fill="#C9A84C" opacity="0.8"/>
  <circle cx="530" cy="150" r="8" fill="none" stroke="#C9A84C" opacity="0.3" stroke-width="1"/>
  
  <!-- Arrows from Turkey to the world -->
  <!-- To Europe -->
  <line x1="530" y1="150" x2="440" y2="130" stroke="#C9A84C" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead)"/>
  <!-- To North America -->
  <line x1="530" y1="150" x2="320" y2="125" stroke="#C9A84C" stroke-width="1" opacity="0.4" marker-end="url(#arrowhead)"/>
  <!-- To South America -->
  <line x1="530" y1="150" x2="340" y2="200" stroke="#C9A84C" stroke-width="1" opacity="0.3" marker-end="url(#arrowhead)"/>
  <!-- To Africa -->
  <line x1="530" y1="150" x2="510" y2="220" stroke="#C9A84C" stroke-width="1" opacity="0.4" marker-end="url(#arrowhead)"/>
  <!-- To Asia -->
  <line x1="530" y1="150" x2="650" y2="140" stroke="#C9A84C" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead)"/>
  <!-- To Australia -->
  <line x1="530" y1="150" x2="700" y2="230" stroke="#C9A84C" stroke-width="1" opacity="0.3" marker-end="url(#arrowhead)"/>
  <!-- To Middle East -->
  <line x1="530" y1="150" x2="580" y2="168" stroke="#C9A84C" stroke-width="0.8" opacity="0.4" marker-end="url(#arrowhead)"/>
  
  <!-- Extra small arrows -->
  <line x1="530" y1="150" x2="400" y2="155" stroke="rgba(201,168,76,0.2)" stroke-width="0.5" marker-end="url(#arrowheadSmall)"/>
  <line x1="530" y1="150" x2="620" y2="180" stroke="rgba(201,168,76,0.2)" stroke-width="0.5" marker-end="url(#arrowheadSmall)"/>
  
  <!-- Country dots -->
  <circle cx="440" cy="130" r="2" fill="#C9A84C" opacity="0.4"/>
  <circle cx="320" cy="125" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="510" cy="220" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="650" cy="140" r="2" fill="#C9A84C" opacity="0.4"/>
  <circle cx="700" cy="230" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="340" cy="200" r="2" fill="#C9A84C" opacity="0.3"/>
  <circle cx="400" cy="155" r="1.5" fill="#C9A84C" opacity="0.2"/>
  <circle cx="620" cy="180" r="1.5" fill="#C9A84C" opacity="0.2"/>
  
  <!-- 'TR' label on Turkey -->
  <text x="535" y="142" font-size="7" fill="#C9A84C" opacity="0.6" font-family="Arial" font-weight="bold">TR</text>
</svg>
