<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C9A84C" opacity="0.6"/>
    </marker>
  </defs>
  
  <!-- Continent Borders (thick, clear) -->
  
  <!-- North America -->
  <path d="M220,115 L235,100 L260,90 L295,85 L320,92 L340,105 L345,120 L338,135 L320,148 L295,158 L270,162 L245,160 L230,150 L222,135 Z" 
        fill="rgba(201,168,76,0.05)" stroke="#C9A84C" stroke-width="1.2" opacity="0.5"/>
  
  <!-- South America -->
  <path d="M265,190 L275,200 L280,220 L282,240 L278,265 L270,285 L262,300 L255,295 L248,278 L245,258 L248,235 L252,215 L258,200 Z" 
        fill="rgba(201,168,76,0.04)" stroke="#C9A84C" stroke-width="1.2" opacity="0.45"/>
  
  <!-- Europe -->
  <path d="M440,185 L455,170 L480,158 L505,152 L525,155 L540,162 L548,175 L545,190 L535,205 L515,215 L490,220 L465,218 L448,210 L438,198 Z" 
        fill="rgba(201,168,76,0.06)" stroke="#C9A84C" stroke-width="1.2" opacity="0.55"/>
  
  <!-- Africa -->
  <path d="M448,218 L460,235 L470,260 L475,290 L472,320 L465,345 L455,362 L445,368 L435,358 L430,340 L428,315 L432,285 L438,255 L442,232 Z" 
        fill="rgba(201,168,76,0.04)" stroke="#C9A84C" stroke-width="1.2" opacity="0.45"/>
  
  <!-- Asia (large) -->
  <path d="M545,160 L575,148 L610,138 L645,132 L680,135 L700,145 L710,160 L708,180 L695,198 L670,210 L640,218 L605,220 L570,218 L548,210 L542,195 Z" 
        fill="rgba(201,168,76,0.05)" stroke="#C9A84C" stroke-width="1.2" opacity="0.5"/>
  
  <!-- India Subcontinent -->
  <path d="M555,218 L565,230 L575,248 L578,268 L572,280 L560,278 L550,268 L545,252 L542,235 Z" 
        fill="rgba(201,168,76,0.04)" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  
  <!-- Australia -->
  <path d="M790,295 L810,285 L835,288 L848,300 L845,320 L830,335 L810,338 L792,330 L785,312 Z" 
        fill="rgba(201,168,76,0.04)" stroke="#C9A84C" stroke-width="1.2" opacity="0.45"/>
  
  <!-- TURKEY (detailed map shape) -->
  <path d="M525,175 L535,168 L548,165 L558,168 L565,175 L568,185 L565,195 L558,202 L548,205 L538,205 L530,200 L525,192 L522,183 Z" 
        fill="#C9A84C" fill-opacity="0.15" stroke="#C9A84C" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Turkey highlight glow -->
  <ellipse cx="545" cy="185" rx="30" ry="22" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Turkey label -->
  <text x="540" y="178" font-size="8" fill="#C9A84C" opacity="0.9" font-family="Arial" font-weight="bold" text-anchor="middle">TÜRKİYE</text>
  
  <!-- Main Arrows from Turkey -->
  <!-- To Europe -->
  <path d="M538,185 L490,175" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.6" marker-end="url(#arrowGold)"/>
  <!-- To North America -->
  <path d="M535,182 L380,130" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4" marker-end="url(#arrowGold)"/>
  <!-- To South America -->
  <path d="M540,190 L460,250" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.35" marker-end="url(#arrowGold)"/>
  <!-- To Africa -->
  <path d="M538,190 L505,285" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.45" marker-end="url(#arrowGold)"/>
  <!-- To Asia -->
  <path d="M545,182 L630,155" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.5" marker-end="url(#arrowGold)"/>
  <!-- To Australia -->
  <path d="M550,192 L720,290" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.3" marker-end="url(#arrowGold)"/>
  <!-- To Middle East -->
  <path d="M548,190 L575,230" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4" marker-end="url(#arrowGold)"/>
  
  <!-- Destination country dots -->
  <circle cx="490" cy="175" r="3" fill="#C9A84C" opacity="0.5"/>
  <circle cx="380" cy="130" r="3" fill="#C9A84C" opacity="0.35"/>
  <circle cx="460" cy="250" r="3" fill="#C9A84C" opacity="0.3"/>
  <circle cx="505" cy="285" r="3" fill="#C9A84C" opacity="0.4"/>
  <circle cx="630" cy="155" r="3" fill="#C9A84C" opacity="0.45"/>
  <circle cx="720" cy="290" r="3" fill="#C9A84C" opacity="0.25"/>
  <circle cx="575" cy="230" r="3" fill="#C9A84C" opacity="0.35"/>
  
  <!-- Continent Labels -->
  <text x="300" y="108" font-size="7" fill="rgba(255,255,255,0.3)" font-family="Arial" font-weight="bold" text-anchor="middle">NORTH AMERICA</text>
  <text x="270" y="270" font-size="7" fill="rgba(255,255,255,0.2)" font-family="Arial" font-weight="bold" text-anchor="middle">SOUTH AMERICA</text>
  <text x="480" y="340" font-size="7" fill="rgba(255,255,255,0.25)" font-family="Arial" font-weight="bold" text-anchor="middle">AFRICA</text>
  <text x="640" y="145" font-size="7" fill="rgba(255,255,255,0.3)" font-family="Arial" font-weight="bold" text-anchor="middle">ASIA</text>
  <text x="825" y="300" font-size="7" fill="rgba(255,255,255,0.2)" font-family="Arial" font-weight="bold" text-anchor="middle">AUSTRALIA</text>
  <text x="568" y="275" font-size="7" fill="rgba(255,255,255,0.2)" font-family="Arial" font-weight="bold" text-anchor="middle">INDIA</text>
  
  <!-- Number of countries text -->
  <text x="540" y="350" font-size="10" fill="#C9A84C" opacity="0.4" font-family="Arial" text-anchor="middle" font-weight="bold">25+ COUNTRIES WORLDWIDE</text>
</svg>
